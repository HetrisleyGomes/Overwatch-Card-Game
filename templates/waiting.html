{% extends 'index.html' %}
{% block centro %}
<style>
.lobby {
    text-align: center;
    color: white;
}

.players {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin: 30px 0;
}

.player {
    background: var(--main-color);
    padding: 20px;
    border-radius: 10px;
    width: 200px;
}

.vs {
    font-size: 24px;
    font-weight: bold;
}
h2, .vs {
    color: var(--main-color);
}
.status {
    margin-top: 10px;
}
.actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    align-items: center;
    padding: 10px 0;
}
</style>
<div class="lobby main">
    <h2>{{ _("combat") }}</h2>

    <div class="players">
        <div class="player" id="p1">
            <div class="name">Jogador 1</div>
            <div class="status">⏳ Aguardando</div>
        </div>

        <div class="vs">VS</div>

        <div class="player" id="p2">
            <div class="name">Aguardando...</div>
            <div class="status">⏳</div>
        </div>
    </div>

    <div class="actions">
        <button id="readyBtn" class="button">{{ _("ready") }}</button>
        <button id="sairBtn" class="button">{{ _("sair") }}</button>
    </div>
</div>
<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

<script>
const socket = io();

const roomId = "{{ room_id }}";
const userId = "{{ session['usuario_id'] }}";
const user = {{ user | tojson }};
const LANG = "{{ lang }}";

socket.emit("join_room", {
    room_id: roomId,
    user_id: userId
});

// atualizar UI
socket.on("room_update", (room) => {
    console.log(room)
    const players = room.players;
    const mensages = ["Pronto ✔", "Aguardando ⏳", "Ready ✔", "Awaiting ⏳"]

    const p1 = players[0];
    const p2 = players[1];
    console.log(user)
    // player 1
    if (LANG == "br"){
        document.querySelector("#p1 .name").innerText =
        p1.id == userId ? user["nome"] : "Oponente";
    } else if (LANG == "en"){
        document.querySelector("#p1 .name").innerText =
        p1.id == userId ? user["nome"] : "opponent";
    }
    
    if (LANG == "br"){
        document.querySelector("#p1 .status").innerText =
        p1.ready ? mensages[0] : mensages[1];
    } else if (LANG == "en"){
        document.querySelector("#p1 .status").innerText =
        p1.ready ? mensages[2] : mensages[3];
    }
    // player 2
    if (p2) {
        if (LANG == "br"){
            document.querySelector("#p2 .name").innerText =
            p2.id == userId ? user["nome"] : "Oponente";
        } else if (LANG == "en"){
            document.querySelector("#p2 .name").innerText =
            p2.id == userId ? user["nome"] : "opponent";
        }
        if (LANG == "br"){
            document.querySelector("#p2 .status").innerText =
            p2.ready ? mensages[0] : mensages[1];
        } else if (LANG == "en"){
            document.querySelector("#p2 .status").innerText =
            p2.ready ? mensages[2] : mensages[3];
        }
    } else {
        if (LANG == "br"){
            document.querySelector("#p2 .name").innerText = mensages[1];
        } else if (LANG == "en"){
            document.querySelector("#p2 .name").innerText = mensages[3];
        }
        document.querySelector("#p2 .status").innerText = "⏳";
    }
});

// botão ready
document.getElementById("readyBtn").onclick = () => {
    socket.emit("player_ready", {
        room_id: roomId,
        user_id: userId
    });
};
// Botão sair
document.getElementById("sairBtn").onclick = () => {
    socket.emit("leave_room", {
        room_id: roomId,
        user_id: userId
    });
    window.location.href = "/";
};

// iniciar jogo
socket.on("start_game", (data) => {
    window.location.href = `/battle/${data.room_id}`;
});
</script>
{% endblock %}
